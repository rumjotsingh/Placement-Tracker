version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React 19
  - Vite 8
  - Tailwind CSS 4
  - shadcn-style UI components
  - React Router 7
  - TanStack Query v5
  - Zustand
  - Axios
  - React Hook Form + Zod
  - Recharts
  - Framer Motion
  - Sonner toasts
routes:
  - path: /
    file: src/pages/public/LandingPage.tsx
    auth_required: false
    description: Public marketing landing page
  - path: /login
    file: src/pages/auth/LoginPage.tsx
    auth_required: false
    description: Email/password and Google OAuth login
  - path: /signup
    file: src/pages/auth/SignupPage.tsx
    auth_required: false
    description: Student registration with email/password or Google OAuth
  - path: /forgot-password
    file: src/pages/auth/ForgotPasswordPage.tsx
    auth_required: false
    description: Request password reset email
  - path: /auth/google/callback
    file: src/pages/auth/GoogleCallbackPage.tsx
    auth_required: false
    description: Google OAuth callback handler
  - path: /student
    file: src/pages/student/StudentDashboard.tsx
    auth_required: true
    description: Student dashboard with stats and charts
  - path: /student/profile
    file: src/pages/student/ProfilePage.tsx
    auth_required: true
    description: Student profile view and edit
  - path: /student/applications
    file: src/pages/student/ApplicationsPage.tsx
    auth_required: true
    description: List of student applications
  - path: /student/applications/:id
    file: src/pages/student/ApplicationDetailPage.tsx
    auth_required: true
    description: Application detail with status timeline
  - path: /student/drives
    file: src/pages/student/DrivesPage.tsx
    auth_required: true
    description: Browse open placement drives
  - path: /student/drives/:id
    file: src/pages/student/DriveDetailPage.tsx
    auth_required: true
    description: Drive detail with eligibility check and apply
  - path: /student/coding
    file: src/pages/student/CodingProfilesPage.tsx
    auth_required: true
    description: Coding platform profiles and sync
  - path: /student/dsa
    file: src/pages/student/DSATrackerPage.tsx
    auth_required: true
    description: DSA progress tracker and analytics
  - path: /student/resume
    file: src/pages/student/ResumeVaultPage.tsx
    auth_required: true
    description: Resume upload and version management
  - path: /student/interviews
    file: src/pages/student/InterviewsPage.tsx
    auth_required: true
    description: Upcoming and past interviews
  - path: /student/notifications
    file: src/pages/student/NotificationsPage.tsx
    auth_required: true
    description: Notification inbox with read/unread
  - path: /student/settings
    file: src/pages/student/SettingsPage.tsx
    auth_required: true
    description: Account settings (read-only)
  - path: /coordinator
    file: src/pages/coordinator/CoordinatorDashboard.tsx
    auth_required: true
    description: Coordinator dashboard with placement stats
  - path: /coordinator/companies
    file: src/pages/coordinator/CompaniesPage.tsx
    auth_required: true
    description: Company CRUD management
  - path: /coordinator/drives
    file: src/pages/coordinator/DrivesPage.tsx
    auth_required: true
    description: Placement drive management
  - path: /coordinator/drives/:id/applicants
    file: src/pages/coordinator/DriveApplicantsPage.tsx
    auth_required: true
    description: Drive applicants list and status updates
  - path: /coordinator/students
    file: src/pages/coordinator/StudentsPage.tsx
    auth_required: true
    description: Student directory
  - path: /coordinator/applications
    file: src/pages/coordinator/ApplicationsPage.tsx
    auth_required: true
    description: All applications management
  - path: /coordinator/interviews
    file: src/pages/coordinator/InterviewsPage.tsx
    auth_required: true
    description: Interview scheduling and feedback
  - path: /coordinator/notifications
    file: src/pages/student/NotificationsPage.tsx
    auth_required: true
    description: Coordinator notifications
  - path: /admin
    file: src/pages/admin/AdminDashboard.tsx
    auth_required: true
    description: Admin analytics dashboard
  - path: /admin/users
    file: src/pages/coordinator/StudentsPage.tsx
    auth_required: true
    description: User management
  - path: /admin/companies
    file: src/pages/coordinator/CompaniesPage.tsx
    auth_required: true
    description: Company management (admin view)
  - path: /admin/drives
    file: src/pages/coordinator/DrivesPage.tsx
    auth_required: true
    description: Drive management (admin view)
  - path: /admin/drives/:id/applicants
    file: src/pages/coordinator/DriveApplicantsPage.tsx
    auth_required: true
    description: Drive applicants (admin view)
  - path: /admin/applications
    file: src/pages/coordinator/ApplicationsPage.tsx
    auth_required: true
    description: Applications management (admin view)
  - path: /admin/interviews
    file: src/pages/coordinator/InterviewsPage.tsx
    auth_required: true
    description: Interview management (admin view)
  - path: /admin/analytics
    file: src/pages/admin/AdminDashboard.tsx
    auth_required: true
    description: Analytics dashboard
features:
  - name: User Login
    description: Login with email and password or Google OAuth
    files:
      - src/pages/auth/LoginPage.tsx
      - src/components/auth/GoogleLoginButton.tsx
      - src/stores/authStore.ts
    entry_route: /login
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Sign In button to submit
      - Click Continue with Google for OAuth
      - See error toast on invalid credentials
    api_calls:
      - method: POST
        endpoint: /api/auth/login
    auth_required: false
  - name: Student Registration
    description: Register a new student account
    files:
      - src/pages/auth/SignupPage.tsx
    entry_route: /signup
    user_interactions:
      - Fill name, email, password, branch, and CGPA fields
      - Click Create Account button
      - Redirect to student dashboard on success
    api_calls:
      - method: POST
        endpoint: /api/auth/register
    auth_required: false
  - name: Browse Placement Drives
    description: Students browse and filter open placement drives
    files:
      - src/pages/student/DrivesPage.tsx
      - src/pages/student/DriveDetailPage.tsx
    entry_route: /student/drives
    user_interactions:
      - View list of open drives
      - Click a drive to view details
      - Check eligibility status
      - Click Apply button if eligible
    api_calls:
      - method: GET
        endpoint: /api/drives
      - method: GET
        endpoint: /api/drives/:id
      - method: GET
        endpoint: /api/drives/:id/eligibility
      - method: POST
        endpoint: /api/applications/drives/:id/apply
    auth_required: true
  - name: Application Tracking
    description: Students track application status and withdraw
    files:
      - src/pages/student/ApplicationsPage.tsx
      - src/pages/student/ApplicationDetailPage.tsx
    entry_route: /student/applications
    user_interactions:
      - View applications list with status badges
      - Click application to view detail and timeline
      - Withdraw application if status allows
    api_calls:
      - method: GET
        endpoint: /api/applications/my
      - method: GET
        endpoint: /api/applications/:id
      - method: PATCH
        endpoint: /api/applications/:id/withdraw
    auth_required: true
  - name: Coding Profiles
    description: Link and sync coding platform profiles
    files:
      - src/pages/student/CodingProfilesPage.tsx
      - src/components/student/CodingPlatformCard.tsx
    entry_route: /student/coding
    user_interactions:
      - Enter usernames for GitHub, LeetCode, Codeforces, CodeChef, GeeksforGeeks
      - Click Sync button per platform
      - View synced stats
    api_calls:
      - method: GET
        endpoint: /api/coding/stats
      - method: POST
        endpoint: /api/coding/sync/github
      - method: POST
        endpoint: /api/coding/sync/leetcode
    auth_required: true
  - name: Coordinator Drive Management
    description: Coordinators create and manage placement drives
    files:
      - src/pages/coordinator/DrivesPage.tsx
      - src/pages/coordinator/DriveApplicantsPage.tsx
    entry_route: /coordinator/drives
    user_interactions:
      - View drives list
      - Create new drive via dialog form
      - Close or delete drives
      - View and update applicant statuses
    api_calls:
      - method: GET
        endpoint: /api/drives
      - method: POST
        endpoint: /api/drives
      - method: PATCH
        endpoint: /api/drives/:id/close
      - method: GET
        endpoint: /api/drives/:id/applicants
      - method: PATCH
        endpoint: /api/applications/:id/status
    auth_required: true
  - name: Interview Scheduling
    description: Coordinators schedule interviews for applicants
    files:
      - src/pages/coordinator/InterviewsPage.tsx
      - src/components/coordinator/ScheduleInterviewDialog.tsx
    entry_route: /coordinator/interviews
    user_interactions:
      - View scheduled interviews
      - Open schedule dialog and fill date, time, mode, link
      - Submit to schedule interview
      - Add feedback and result
    api_calls:
      - method: GET
        endpoint: /api/interviews
      - method: POST
        endpoint: /api/interviews
      - method: PATCH
        endpoint: /api/interviews/:id/feedback
    auth_required: true
  - name: Role-Based Access Control
    description: Routes protected by student, coordinator, and admin roles
    files:
      - src/components/shared/ProtectedRoute.tsx
      - src/app/App.tsx
    entry_route: /login
    user_interactions:
      - Unauthenticated users redirected to /login
      - Students cannot access /coordinator or /admin routes
      - Coordinators access /coordinator portal
      - Admins access /admin portal
    api_calls: []
    auth_required: false
known_limitations:
  - issue: Settings page is read-only with no save functionality
    location: src/pages/student/SettingsPage.tsx
    impact: Users cannot change account settings from UI
  - issue: Header search bar is non-functional
    location: src/layouts/DashboardLayout.tsx
    impact: Search input does not filter or navigate
  - issue: Student dashboard weekly chart uses mock data
    location: src/pages/student/StudentDashboard.tsx
    impact: Chart may not reflect real application activity
  - issue: No reset password page in frontend
    location: src/app/App.tsx
    impact: Password reset flow incomplete in UI
  - issue: No company edit UI for coordinators
    location: src/pages/coordinator/CompaniesPage.tsx
    impact: Companies can be created but not edited via UI
